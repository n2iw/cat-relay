name: Build Nightly Release
on:
  workflow_dispatch:
  schedule:
    # 05:00 UTC — adjust if you want a different "nightly" window
    - cron: "0 5 * * *"

permissions:
  contents: write

concurrency:
  group: nightly-release
  cancel-in-progress: true

jobs:
  should-build:
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.check.outputs.build }}
    steps:
      - name: Check out default branch
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - name: Decide whether to run build
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          CURRENT=$(git rev-parse HEAD | tr "[:upper:]" "[:lower:]")

          if ! gh release view nightly --repo "${{ github.repository }}" --json targetCommitish > /tmp/nightly.json 2>/dev/null; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            echo "No nightly release yet; running build."
            exit 0
          fi

          TARGET=$(jq -r .targetCommitish /tmp/nightly.json | tr "[:upper:]" "[:lower:]")
          if [ -z "$TARGET" ] || [ "$TARGET" = "null" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            echo "Nightly release has no target; running build."
            exit 0
          fi

          if [ "$CURRENT" = "$TARGET" ]; then
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "Nightly already points at ${CURRENT}; skipping build."
          else
            echo "build=true" >> "$GITHUB_OUTPUT"
            echo "Changes since nightly (nightly=${TARGET}, HEAD=${CURRENT}); running build."
          fi

  build-zips:
    needs: should-build
    if: needs.should-build.outputs.build == 'true'
    uses: ./.github/workflows/build-zips.yaml

  publish-nightly-release:
    runs-on: ubuntu-latest
    needs: build-zips
    steps:
      - name: Download built archives
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: cat-relay-*
          merge-multiple: true
      - name: Recreate nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release delete nightly --yes --cleanup-tag || true
          gh api -X DELETE "repos/${{ github.repository }}/git/refs/tags/nightly" || true
          gh release create nightly \
            dist/cat-relay-src.zip \
            dist/cat-relay-mac-arm.zip \
            dist/cat-relay-mac-x64.zip \
            dist/cat-relay-win.zip \
            --target "${GITHUB_SHA}" \
            --title "Nightly Build" \
            --notes "Automated nightly build for ${GITHUB_SHA}" \
            --prerelease
