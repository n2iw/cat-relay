name: Build and Attach Apps
on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-zips:
    uses: ./.github/workflows/build-zips.yaml

  attach-release-assets:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: build-zips
    steps:
      - name: Download built archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: cat-relay-*
          merge-multiple: true
      - name: Attach archives to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dist/cat-relay-src.zip \
            dist/cat-relay-mac-arm.zip \
            dist/cat-relay-mac-x64.zip \
            dist/cat-relay-win.zip \
            --clobber
