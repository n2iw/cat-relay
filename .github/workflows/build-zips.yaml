name: Build Zip Artifacts
on:
  workflow_call:

permissions:
  contents: read

jobs:
  build-source:
    runs-on: ubuntu-latest
    steps:
      - name: Print ref and SHA
        run: echo "REF=${{ github.ref_name }} SHA=${{ github.sha }}"
      - name: Check out the branch
        uses: actions/checkout@v5
        with:
          submodules: true
      - name: Pack source code
        run: |
          mkdir -p dist
          zip -r dist/cat-relay-src.zip .
      - name: Upload source code archive
        uses: actions/upload-artifact@v6
        with:
          name: cat-relay-src
          path: dist/cat-relay-src.zip

  build-macOS-app-apple-silicon:
    runs-on: macos-latest
    steps:
      - name: Print ref and SHA
        run: echo "REF=${{ github.ref_name }} SHA=${{ github.sha }}"
      - name: Check out the branch
        uses: actions/checkout@v5
        with:
          submodules: true
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build macOS App - Apple Silicon
        env:
          ARCHFLAGS: "-arch arm64"
        run: |
          pyinstaller src/app.py --name CatRelay --windowed --distpath dist/mac-arm
      - name: Pack macOS app - Apple Silicon
        run: |
          cd dist/mac-arm
          zip -r ../cat-relay-mac-arm.zip CatRelay.app
        shell: bash
      - name: Upload macOS app - Apple Silicon
        uses: actions/upload-artifact@v6
        with:
          name: cat-relay-mac-arm
          path: dist/cat-relay-mac-arm.zip

  build-macOS-app-intel:
    runs-on: macos-15-intel
    steps:
      - name: Print ref and SHA
        run: echo "REF=${{ github.ref_name }} SHA=${{ github.sha }}"
      - name: Check out the branch
        uses: actions/checkout@v5
        with:
          submodules: true
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build macOS App - Intel
        run: |
          pyinstaller src/app.py --name CatRelay --windowed --distpath dist/mac-x64
      - name: Pack macOS app - Intel
        run: |
          cd dist/mac-x64
          zip -r ../cat-relay-mac-x64.zip CatRelay.app
        shell: bash
      - name: Upload macOS app - Intel
        uses: actions/upload-artifact@v6
        with:
          name: cat-relay-mac-x64
          path: dist/cat-relay-mac-x64.zip

  build-windows-app:
    runs-on: windows-latest
    steps:
      - name: Print ref and SHA
        run: echo "REF=${{ github.ref_name }} SHA=${{ github.sha }}"
      - name: Check out the branch
        uses: actions/checkout@v5
        with:
          submodules: true
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build Windows App
        run: |
          pyinstaller src/app.py --name CatRelay --windowed --distpath dist/windows
      - name: Pack Windows App
        run: |
          cd dist/windows
          Compress-Archive -Path .\* -DestinationPath ../cat-relay-win.zip
      - name: Upload Windows App
        uses: actions/upload-artifact@v6
        with:
          name: cat-relay-win
          path: dist/cat-relay-win.zip
